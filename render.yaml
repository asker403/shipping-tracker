# Render Blueprint Specification for Free Shipping Tracker app
# To deploy, connect your repository to Render and use this blueprint definition.
services:
  - type: web
    name: free-shipping-tracker
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this to your Supabase PostgreSQL connection string in Render Dashboard
      - key: SHOPIFY_API_KEY
        sync: false # Set this to your Shopify Partner App client ID in Render Dashboard
      - key: SHOPIFY_API_SECRET
        sync: false # Set this to your Shopify Partner App secret key in Render Dashboard
      - key: SHOPIFY_APP_URL
        sync: false # Set this to your Render Service URL (e.g. https://free-shipping-tracker.onrender.com) in Render Dashboard
      - key: SCOPES
        value: ""
